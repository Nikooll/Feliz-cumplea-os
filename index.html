<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz 19 Amor</title>

<style>
body{
    margin:0;
    background:#ffffff;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    color:#333;
    overflow-x:hidden;
}

/* PANTALLA INICIAL */
.inicio{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.boton-abrir{
    padding:20px 50px;
    background:#e60000;
    color:white;
    border:none;
    border-radius:15px;
    font-size:22px;
    cursor:pointer;
    box-shadow:0 15px 35px rgba(230,0,0,0.3);
    transition:0.3s;
}

.boton-abrir:hover{
    transform:scale(1.05);
}

/* CONTENIDO */
.contenido{
    display:none;
    padding-bottom:80px;
}

/* TITULO */
h1{
    margin-top:60px;
    font-size:55px;
    color:#e60000;
    font-weight:600;
}

/* PASTEL */
.pastel-container{
    margin-top:50px;
    position:relative;
    height:300px;
}

.capa{
    width:230px;
    margin:0 auto;
    position:absolute;
    left:0;
    right:0;
    border-radius:18px;
    box-shadow:0 15px 30px rgba(0,0,0,0.08);
    transform:translateY(-400px);
    opacity:0;
}

.base{ background:#c85a17; height:80px; bottom:0; }
.capa2{ background:#f4a261; height:70px; bottom:80px; }
.crema{ background:#ffe5d9; height:55px; bottom:150px; }

.velas{
    position:absolute;
    bottom:220px;
    left:0;
    right:0;
    font-size:32px;
    transform:translateY(-400px);
    opacity:0;
}

.numero{
    position:absolute;
    bottom:260px;
    left:0;
    right:0;
    font-size:50px;
    font-weight:bold;
    color:#e60000;
    opacity:0;
    animation:brillo 2s infinite alternate;
}

@keyframes brillo{
    from{ text-shadow:0 0 5px rgba(230,0,0,0.2); }
    to{ text-shadow:0 0 20px rgba(230,0,0,0.6); }
}

/* MENSAJE */
#mensaje{
    margin-top:60px;
    font-size:22px;
    white-space:pre-line;
    min-height:60px;
}

/* MINI CARTAS */
.cartas{
    margin-top:60px;
}

.sobre{
    width:350px;
    margin:25px auto;
    background:#ffffff;
    border-radius:15px;
    box-shadow:0 15px 35px rgba(0,0,0,0.07);
    overflow:hidden;
    transition:0.4s;
}

.sobre-header{
    padding:18px;
    background:#e60000;
    color:white;
    font-weight:500;
    cursor:pointer;
}

.sobre-contenido{
    max-height:0;
    overflow:hidden;
    transition:max-height 0.6s ease, padding 0.6s ease;
    padding:0 25px;
    font-size:17px;
}

.sobre.abierto .sobre-contenido{
    max-height:200px;
    padding:25px;
}

</style>
</head>

<body>

<!-- INICIO -->
<div class="inicio" id="inicio">
    <button class="boton-abrir" onclick="abrirTodo()">Abrir</button>
</div>

<!-- CONTENIDO -->
<div class="contenido" id="contenido">

<h1>Feliz Cumpleaños Amor ❤️</h1>

<div class="pastel-container">
    <div class="capa base" id="base"></div>
    <div class="capa capa2" id="capa2"></div>
    <div class="capa crema" id="crema"></div>
    <div class="velas" id="velas">🕯️🕯️</div>
    <div class="numero" id="numero">19</div>
</div>

<div id="mensaje"></div>

<div class="cartas">

    <div class="sobre" onclick="abrirSobre(this)">
        <div class="sobre-header">Abrir</div>
        <div class="sobre-contenido">
            Feliz 19 vueltas al sol, mi amor ❤️
        </div>
    </div>

    <div class="sobre" onclick="abrirSobre(this)">
        <div class="sobre-header">Abrir</div>
        <div class="sobre-contenido">
            Espero que cada uno de tus sueños se cumpla y que pueda estar a tu lado acompañándote.
        </div>
    </div>

    <div class="sobre" onclick="abrirSobre(this)">
        <div class="sobre-header">Abrir</div>
        <div class="sobre-contenido">
            Queda pendiente esa comida para celebrar su cumple  ❤️
        </div>
    </div>

</div>

</div>

<script>

/* ABRIR PRINCIPAL */
function abrirTodo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("contenido").style.display="block";
    animarPastel();
    maquina();
}

/* ANIMACION CAIDA REAL */
function animarPastel(){
    let elementos=["base","capa2","crema","velas","numero"];
    elementos.forEach((id,i)=>{
        setTimeout(()=>{
            let el=document.getElementById(id);
            el.style.transition="1s ease";
            el.style.transform="translateY(0)";
            el.style.opacity="1";
        },i*700);
    });
}

/* MAQUINA DE ESCRIBIR */
function maquina(){
    let texto="Espero que pase un cumpleaños bonito.\nP.D. No tomara mucho jsjs ❤️";
    let i=0;
    function escribir(){
        if(i<texto.length){
            document.getElementById("mensaje").innerHTML+=texto.charAt(i);
            i++;
            setTimeout(escribir,40);
        }
    }
    escribir();
}

/* SOLO UNA CARTA ABIERTA */
function abrirSobre(elemento){
    document.querySelectorAll(".sobre").forEach(s=>{
        if(s!==elemento){
            s.classList.remove("abierto");
        }
    });
    elemento.classList.toggle("abierto");
}

</script>

</body>
</html>
