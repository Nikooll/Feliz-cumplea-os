<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz 19 💙</title>

<style>

/* ===== FONDO CELESTE SUAVE ===== */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#dbeeff;
    text-align:center;
    color:#1e1e1e;
}

/* ===== PANTALLA INICIAL ===== */
.inicio{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Sobre bonito */
.sobre-inicial{
    width:340px;
    height:200px;
    background:white;
    position:relative;
    border-radius:15px;
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:18px;
    transition:0.3s;
}

.sobre-inicial:hover{
    transform:scale(1.04);
}

.sobre-inicial::before{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(to bottom right,#ffffff,#f0f0f0);
    border-radius:15px;
    z-index:-1;
}

/* ===== CONTENIDO ===== */
.contenido{
    display:none;
    padding-bottom:80px;
}

h1{
    margin-top:60px;
    font-size:45px;
    color:#0a6fb6;
}

/* ===== PASTEL SIMPLE BONITO ===== */
.pastel{
    margin:40px auto;
    width:220px;
    height:180px;
    position:relative;
}

.pastel-base{
    width:220px;
    height:80px;
    background:#b5651d;
    border-radius:20px;
    position:absolute;
    bottom:0;
}

.pastel-medio{
    width:200px;
    height:60px;
    background:#ffd6a5;
    border-radius:20px;
    position:absolute;
    bottom:80px;
    left:10px;
}

.pastel-top{
    width:180px;
    height:50px;
    background:white;
    border-radius:20px;
    position:absolute;
    bottom:140px;
    left:20px;
}

.velas{
    position:absolute;
    bottom:180px;
    left:0;
    right:0;
    font-size:28px;
}

/* ===== MENSAJE ===== */
#mensaje{
    margin-top:40px;
    font-size:18px;
    white-space:pre-line;
    width:80%;
    max-width:500px;
    margin-left:auto;
    margin-right:auto;
}

/* ===== CARTAS ===== */
.cartas{
    margin-top:50px;
}

/* Sobre pequeño real */
.sobre{
    width:300px;
    margin:25px auto;
    position:relative;
    background:white;
    border-radius:10px;
    box-shadow:0 15px 35px rgba(0,0,0,0.08);
    cursor:pointer;
    overflow:hidden;
    transition:0.3s;
}

.sobre-header{
    padding:15px;
    background:#0a6fb6;
    color:white;
    font-weight:bold;
}

.sobre-contenido{
    max-height:0;
    overflow:hidden;
    transition:0.5s ease;
    padding:0 20px;
    font-size:15px;
}

.sobre.abierto .sobre-contenido{
    max-height:200px;
    padding:20px;
}

</style>
</head>

<body>

<div class="inicio" id="inicio">
    <div class="sobre-inicial" onclick="abrirTodo()">
        💌 Toca aquí
    </div>
</div>

<div class="contenido" id="contenido">

<h1>Feliz 19 💙</h1>

<div class="pastel">
    <div class="pastel-base"></div>
    <div class="pastel-medio"></div>
    <div class="pastel-top"></div>
    <div class="velas">🕯️ 🕯️</div>
</div>

<div id="mensaje"></div>

<div class="cartas">

    <div class="sobre" onclick="abrirSobre(this)">
        <div class="sobre-header">1</div>
        <div class="sobre-contenido">
            Hoy es su cumple y solo quiero recordarle lo importante que es para mí.
            Felices 19 vueltas al sol amor.
        </div>
    </div>

    <div class="sobre" onclick="abrirSobre(this)">
        <div class="sobre-header">2</div>
        <div class="sobre-contenido">
            Espero que cada uno de sus sueños se cumpla y pueda estar a su lado. 
            Siempre estaré orgullosa de usted.
        </div>
    </div>

    <div class="sobre" onclick="abrirSobre(this)">
        <div class="sobre-header">3</div>
        <div class="sobre-contenido">
            Queda pendiente esa comida para celebrar su cumple ❤️.
        </div>
    </div>

</div>

</div>

<script>

function abrirTodo(){
    document.getElementById("inicio").style.display="none";
    document.getElementById("contenido").style.display="block";
    maquina();
}

function maquina(){
    let texto="Feliz cumpleaños.\nEspero que tenga un día muy bonito 💙";
    let i=0;
    function escribir(){
        if(i<texto.length){
            document.getElementById("mensaje").innerHTML+=texto.charAt(i);
            i++;
            setTimeout(escribir,40);
        }
    }
    escribir();
}

function abrirSobre(elemento){
    document.querySelectorAll(".sobre").forEach(s=>{
        if(s!==elemento){
            s.classList.remove("abierto");
        }
    });
    elemento.classList.toggle("abierto");
}

</script>

</body>
</html>
