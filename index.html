<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz 19 Amor</title>

<style>
body{
    margin:0;
    background:white;
    font-family:'Segoe UI',sans-serif;
    text-align:center;
    color:#333;
}

/* TITULO */
h1{
    margin-top:60px;
    font-size:48px;
    font-weight:300;
}

.amor{
    color:red;
    font-weight:bold;
}

.corazon{
    color:red;
    font-size:40px;
}

/* PASTEL */
.pastel-container{
    margin-top:40px;
    position:relative;
    height:220px;
}

.capa{
    width:180px;
    margin:0 auto;
    position:absolute;
    left:0;
    right:0;
    opacity:0;
}

.base{ background:#d2691e; height:50px; bottom:0; border-radius:10px; }
.capa2{ background:#f4a460; height:40px; bottom:50px; border-radius:10px; }
.crema{ background:#fff5ee; height:30px; bottom:90px; border-radius:10px; }
.velas{ bottom:120px; font-size:30px; }

.numero{
    position:absolute;
    bottom:150px;
    left:0;
    right:0;
    font-size:40px;
    font-weight:bold;
    color:#333;
    opacity:0;
}

/* MENSAJE */
#mensaje{
    margin-top:40px;
    font-size:20px;
    min-height:50px;
    white-space:pre-line;
}

/* MINI CARTAS */
.cartas{
    margin-top:40px;
}

.mini-carta{
    margin:15px auto;
    width:300px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
    transition:0.4s;
}

.mini-carta button{
    margin-top:10px;
    padding:6px 15px;
    background:black;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.contenido-carta{
    display:none;
    margin-top:10px;
    font-size:16px;
}
</style>
</head>

<body>

<h1>Feliz Cumpleaños <span class="amor">Amor</span> <span class="corazon">❤️</span></h1>

<div class="pastel-container">
    <div class="capa base" id="base"></div>
    <div class="capa capa2" id="capa2"></div>
    <div class="capa crema" id="crema"></div>
    <div class="capa velas" id="velas">🕯🕯</div>
    <div class="numero" id="numero">19</div>
</div>

<div id="mensaje"></div>

<div class="cartas">

    <div class="mini-carta">
        <button onclick="abrirMini(this)">Abrir</button>
        <div class="contenido-carta">
            Feliz 19 vueltas al sol, mi amor 🤍
        </div>
    </div>

    <div class="mini-carta">
        <button onclick="abrirMini(this)">Abrir</button>
        <div class="contenido-carta">
            Espero que cada uno de tus sueños se cumpla y que pueda estar a tu lado acompañándote en cada meta que te propongas.
        </div>
    </div>

    <div class="mini-carta">
        <button onclick="abrirMini(this)">Abrir</button>
        <div class="contenido-carta">
            Queda pendiente esa comida especial para celebrar tu cumpleaños como se debe 🤍
        </div>
    </div>

</div>

<script>

/* ANIMACION PASTEL */
function animarPastel(){
    let elementos=["base","capa2","crema","velas","numero"];
    elementos.forEach((id,i)=>{
        setTimeout(()=>{
            document.getElementById(id).style.opacity="1";
        },i*600);
    });
}

/* MAQUINA DE ESCRIBIR */
function maquina(){
    let texto="Espero que pases un cumpleaños increíble.\nP.D. No tomarás mucho jajs 🤍";
    let i=0;
    function escribir(){
        if(i<texto.length){
            document.getElementById("mensaje").innerHTML+=texto.charAt(i);
            i++;
            setTimeout(escribir,50);
        }
    }
    escribir();
}

/* MINI CARTAS */
function abrirMini(boton){
    let contenido=boton.nextElementSibling;
    contenido.style.display=contenido.style.display==="block"?"none":"block";
}

animarPastel();
maquina();

</script>

</body>
</html>
