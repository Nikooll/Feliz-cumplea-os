<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Cumpleee Amor</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    text-align:center;
    overflow:hidden;
    background:url("https://images.unsplash.com/photo-1542362567-b07e54358753?auto=format&fit=crop&w=1920&q=80");
    background-size:cover;
    background-position:center;
}

/* OSCURECER FONDO */
body::after{
    content:"";
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:-1;
}

/* CARTA */
.carta{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

.sobre-img{
    width:250px;
    filter:drop-shadow(0 0 20px red);
}

button{
    margin-top:20px;
    padding:12px 30px;
    background:linear-gradient(#444,#111);
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    box-shadow:0 0 15px rgba(255,0,0,0.6);
}

button:hover{
    transform:scale(1.1);
}

/* CONTENIDO */
.contenido{
    display:none;
    margin-top:100px;
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

h1{
    font-size:45px;
    text-shadow:0 0 20px red;
}

.latido{
    display:inline-block;
    animation:latido 1s infinite;
    color:#ff1a1a;
}

@keyframes latido{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

.pastel{
    font-size:100px;
    margin-top:20px;
}

/* MOTO DE CARRERAS */
.moto{
    position:absolute;
    bottom:40px;
    left:-300px;
    width:200px;
    animation:moverMoto 5s linear infinite;
}

@keyframes moverMoto{
    from{left:-300px;}
    to{left:110%;}
}

/* HUMO */
.humo{
    position:absolute;
    bottom:60px;
    left:0;
    width:20px;
    height:20px;
    background:rgba(200,200,200,0.3);
    border-radius:50%;
    animation:humoAnim 2s linear infinite;
}

@keyframes humoAnim{
    0%{transform:translateX(0) scale(1); opacity:0.6;}
    100%{transform:translateX(120px) scale(3); opacity:0;}
}

/* CORAZONES */
.corazon{
    position:absolute;
    color:#ff0000;
    animation:caer 5s linear;
}

@keyframes caer{
    from{top:-50px;}
    to{top:110%;}
}

/* MAQUINA */
#mensaje{
    margin-top:40px;
    font-size:22px;
    white-space:pre-line;
    border-right:2px solid white;
    display:inline-block;
    min-height:60px;
}
</style>
</head>

<body>

<div class="carta" id="carta">
    <img class="sobre-img" src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
    <br>
    <button onclick="abrirCarta()">Abrir</button>
</div>

<div class="contenido" id="contenido">
    <h1>Feliz Cumpleee <span class="latido">Amor</span></h1>
    <div class="pastel">🎂</div>
    <div id="mensaje"></div>
</div>

<!-- MOTO CARRERA -->
<img class="moto" src="https://pngimg.com/uploads/motorcycle/motorcycle_PNG3148.png">

<audio id="musica" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5f4b57f4b0.mp3?filename=romantic-background-112191.mp3" type="audio/mpeg">
</audio>

<script>
function abrirCarta(){
    document.getElementById("carta").style.display="none";
    document.getElementById("contenido").style.display="block";
    document.getElementById("musica").play();
    lluviaCorazones();
    maquinaEscribir();
    crearHumo();
}

/* CORAZONES 5 SEGUNDOS */
function lluviaCorazones(){
    let intervalo=setInterval(()=>{
        let corazon=document.createElement("div");
        corazon.classList.add("corazon");
        corazon.innerHTML="❤️";
        corazon.style.left=Math.random()*100+"%";
        corazon.style.fontSize=(Math.random()*20+20)+"px";
        document.body.appendChild(corazon);

        setTimeout(()=>{corazon.remove();},5000);
    },300);

    setTimeout(()=>{clearInterval(intervalo);},5000);
}

/* MAQUINA */
function maquinaEscribir(){
    let texto="Espero q pases un cumpleaños increible\n P.D no tomaras mucho jsjs";
    let i=0;
    function escribir(){
        if(i<texto.length){
            document.getElementById("mensaje").innerHTML+=texto.charAt(i);
            i++;
            setTimeout(escribir,60);
        }
    }
    escribir();
}

/* HUMO */
function crearHumo(){
    setInterval(()=>{
        let humo=document.createElement("div");
        humo.classList.add("humo");
        humo.style.left=(Math.random()*150)+"px";
        document.body.appendChild(humo);
        setTimeout(()=>{humo.remove();},2000);
    },200);
}
</script>

</body>
</html>
